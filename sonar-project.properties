# SonarCloud Configuration
# https://sonarcloud.io

# Organization and Project Keys (REQUIRED - Configure in SonarCloud)
# Replace with your actual organization and project key from SonarCloud
sonar.organization=pauloeugenioreis
sonar.projectKey=pauloeugenioreis_dotnet-enterprise-template-10

# Project Metadata
sonar.projectName=.NET 10 Enterprise Template
sonar.projectVersion=1.0

# Source Code
sonar.sources=src
sonar.tests=tests

# Exclusions
sonar.exclusions=**/obj/**,**/bin/**,**/wwwroot/**,**/node_modules/**,**/Migrations/**,**/Properties/**
sonar.test.exclusions=**/obj/**,**/bin/**

# Coverage Exclusions
sonar.coverage.exclusions=\
  **/Program.cs,\
  **/Startup.cs,\
  **/Migrations/**,\
  **/Seeders/**,\
  **/*Extensions.cs,\
  **/AppSettings.cs,\
  **/GlobalUsings.cs,\
  **/ApiControllerBase.cs,\
  **/EntityBase.cs

# Code Coverage
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=**/*.trx

# Language
sonar.language=cs

# Source Encoding
sonar.sourceEncoding=UTF-8

# .NET Specific
sonar.dotnet.excludeTestProjects=true

# Links
sonar.links.homepage=https://github.com/pauloeugenioreis/dotnet-enterprise-template-10
sonar.links.ci=https://github.com/pauloeugenioreis/dotnet-enterprise-template-10/actions
sonar.links.scm=https://github.com/pauloeugenioreis/dotnet-enterprise-template-10
sonar.links.issue=https://github.com/pauloeugenioreis/dotnet-enterprise-template-10/issues

services:
  # ─────────────────────────── DATABASES ───────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres-events:
    image: postgres:17-alpine
    container_name: postgres-events
    environment:
      - POSTGRES_DB=GoodHamburgerEvents
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-events-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────── API ───────────────────────────────────
  # Build: docker compose build api
  # A API roda MigrateAsync() + SeedAsync() automaticamente
  # na inicialização quando ASPNETCORE_ENVIRONMENT=Development
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: goodhamburger-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - AppSettings__Infrastructure__Database__ConnectionString=Server=sqlserver,1433;Database=GoodHamburger;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
      - AppSettings__Infrastructure__EventSourcing__ConnectionString=Host=postgres-events;Database=GoodHamburgerEvents;Username=postgres;Password=postgres
    ports:
      - "3060:80"
    networks:
      - app-network
    depends_on:
      sqlserver:
        condition: service_healthy
      postgres-events:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ─────────────────────────── WEB ───────────────────────────────────
  # Build: docker compose build web
  # Blazor Server — aponta para a API via rede interna do Docker
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: goodhamburger-web
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - Api__BaseUrl=http://api:80/
    ports:
      - "5001:80"
    networks:
      - app-network
    depends_on:
      api:
        condition: service_healthy

networks:
  app-network:
    driver: bridge

volumes:
  sqlserver-data:
  postgres-events-data:

